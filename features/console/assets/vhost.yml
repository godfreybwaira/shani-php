# =====================================================================
# Versioning Strategy: One Project, one virtual host, multiple versions
# =====================================================================
project_name: {project_name}

# Directory for storing CGI related configurations for Web servers like Apache and Nginx
cgi_directory: /.cgi

# Application storage locations
app_storage: /.bucket
# Static assets storage location
buckets:
  # Accessible by asset owner, group or anyone if it is the group asset and no group is provided.
  private: /0pv
  # Public assets is accessible by everyone.
  public: /1pb

version:
  # Header the client sends to request a specific project version number
  request_header: "Accept-Version"

  # Header we send back to tell the client which version was actually used
  # Set to null if you don't want to return any version header
  response_header: "Content-Version"

  # Fallback version when request_header is missing
  default: {default_version}

  # Supported versions and their dedicated config files
  # The framework will load the corresponding .yml file for the chosen version
  supported:
####v1#