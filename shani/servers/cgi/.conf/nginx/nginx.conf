# ---------------------------------------------------------
# PORTABLE NGINX CONFIG WITH HTTPS REDIRECT
# ---------------------------------------------------------

## HTTP Server Block (Port 80) - The Redirector
server {
    listen 80;
    listen [::]:80;

    include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/custom.conf;

    return 301 https://$host$request_uri;
}

## HTTPS Server Block (Port 443) - The Application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Load custom configuration
    include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/custom.conf;

    root $project_root;
    index index.php;

    # Include the SSL certificate and key
    include snippets/self-signed.conf;
    include snippets/ssl-params.conf;

    # This rewrite rule applies to every request not starting with /index.php
      rewrite ^ /index.php?$query_string last;

    # Process PHP files using PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;

        # Security: Close vulnerabilities
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_pass unix:$php_fpm_socket;
        # Alternatively:
        # fastcgi_pass 127.0.0.1:9000;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}