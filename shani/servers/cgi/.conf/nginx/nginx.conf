# ---------------------------------------------------------
# PORTABLE NGINX CONFIG WITH HTTPS REDIRECT
# ---------------------------------------------------------

## HTTP Server Block (Port 80) - The Redirector
server {
    listen 80;
    listen [::]:80;

    include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/custom.conf;

    return 301 https://$host$request_uri;
}

    ## HTTPS Server Block (Port 443) - The Application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # Load custom configuration
    include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/custom.conf;

    root $project_root;
    index index.php;
    rewrite ^ /index.php?$query_string last;

    # Include the SSL certificate and key
    include snippets/self-signed.conf;
    include snippets/ssl-params.conf;

    # Deny access to hidden files
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    ##################### STATIC FILE HANDLING ####################
    include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/optimization.conf;

    location /0pv/ {
        alias $project_root/bucket/;
        include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/static.conf;
    }

    location /1pb/ {
        alias $project_root/gui/assets/;
        include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/static.conf;
    }

    # Process PHP files using PHP-FPM
    location ~ \.php$ {
        include /var/www/html/shani-php/shani/servers/cgi/.conf/nginx/dynamic.conf;
    }
    ##################### END STATIC FILE HANDLING ####################
}