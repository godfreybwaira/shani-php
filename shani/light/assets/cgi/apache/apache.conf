# 1. Define the base path for your project
Define PROJECT_ROOT /var/www/html/{{shani_root}}
Define SERVER_DOMAIN {{domain_name}}

# ---------------------------------------------------------
# HTTP VirtualHost (Port 8080) - The Redirector
# ---------------------------------------------------------
<VirtualHost *:8080>
    ServerName  ${SERVER_DOMAIN}

    # Redirects all traffic to HTTPS on port 44380
    # The '/' ensures the entire request path is preserved
    Redirect permanent / https://${SERVER_DOMAIN}:44380/
</VirtualHost>

# ---------------------------------------------------------
# HTTPS VirtualHost (Port 44380) - The Application
# ---------------------------------------------------------
<VirtualHost *:44380>
    ServerName   ${SERVER_DOMAIN}
    DocumentRoot ${PROJECT_ROOT}

    #####################STATIC FILE HANDLING####################
    # You'll need to enable the following Apache modules: xsendfile, deflate,
    # headers, expires then restart Apache.

    # Optional: disable OS sendfile if you serve files from NFS/SMB
    EnableSendfile On

    # --- Protected assets ---
    # This is necessary because .htaccess redirects all request to php application
    # but only if you choose to serve static assets using Apache
    <IfModule mod_xsendfile.c>
        XSendFile On
        XSendFilePath "${PROJECT_ROOT}/{{asset_dir}}/"
        XSendFilePath "${PROJECT_ROOT}/{{storage_dir}}/"
    </IfModule>

   # BEST PRACTICE: Security & Permissions for the Aliased directory
    <Directory ${PROJECT_ROOT}>
        Options -Indexes
        AllowOverride None

        # BEST PRACTICE: Gzip Compression (mod_deflate)
        <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/* */json */xml */javascript */svg+xml
        </IfModule>

        # BEST PRACTICE: Browser Caching (mod_expires)
        <IfModule mod_expires.c>
            ExpiresActive On
            ExpiresDefault "access plus 30 days"
            Header append Cache-Control "public, no-transform"
        </IfModule>

        # BEST PRACTICE: Logging optimization
        # Prevents logging requests for files in this directory to the access log
        SetEnvIf Request_URI "^{{public_bucket}}/" dontlog
    </Directory>
    #####################END STATIC FILE HANDLING####################

    ErrorLog  ${APACHE_LOG_DIR}/${SERVER_DOMAIN}-error.log
    CustomLog ${APACHE_LOG_DIR}/${SERVER_DOMAIN}-access.log combined

    SSLEngine on
    SSLCertificateFile    ${PROJECT_ROOT}/{{ssl_dir}}/server.crt
    SSLCertificateKeyFile ${PROJECT_ROOT}/{{ssl_dir}}/server.key

    Protocols h2 http/1.1

    <Directory ${PROJECT_ROOT}>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>